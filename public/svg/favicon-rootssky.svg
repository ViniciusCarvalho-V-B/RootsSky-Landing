<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Gold gradient for crown -->
    <linearGradient id="crown-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="30%" stop-color="#FCD34D"/>
      <stop offset="70%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>

    <!-- Crown band decorative gradient -->
    <linearGradient id="crown-band" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="50%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>

    <!-- Crown jewel emerald gradient -->
    <radialGradient id="jewel-emerald" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="40%" stop-color="#34D399"/>
      <stop offset="80%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </radialGradient>

    <!-- Leaf/vine green gradient -->
    <linearGradient id="vine-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>

    <!-- Leaf green gradient -->
    <linearGradient id="leaf-green" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>

    <!-- Glow filters for tab visibility -->
    <filter id="crown-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#F59E0B" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="emerald-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#10B981" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Group centered & scaled up to fill the square -->
  <g transform="translate(60, 60) scale(1.35) translate(-200, -52)">
    <!-- Vines left -->
    <g id="vines-left" filter="url(#emerald-glow)">
      <path d="M140,48 Q125,40 115,50 Q102,62 95,52 Q88,42 78,50"
            fill="none" stroke="url(#vine-green)" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M78,50 Q72,42 68,48 Q72,55 78,50 Z" fill="url(#leaf-green)"/>
      <path d="M95,52 Q89,44 85,50 Q89,57 95,52 Z" fill="url(#leaf-green)"/>
    </g>

    <!-- Vines right -->
    <g id="vines-right" filter="url(#emerald-glow)">
      <path d="M260,48 Q275,40 285,50 Q298,62 305,52 Q312,42 322,50"
            fill="none" stroke="url(#vine-green)" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M322,50 Q328,42 332,48 Q328,55 322,50 Z" fill="url(#leaf-green)"/>
      <path d="M305,52 Q311,44 315,50 Q311,57 305,52 Z" fill="url(#leaf-green)"/>
    </g>

    <!-- Glow background behind crown -->
    <path d="
      M160,55 L162,30 L170,42 L178,15 L186,42 L200,8 L214,42 L222,15 L230,42 L238,30 L240,55 Z"
      fill="#F59E0B" filter="url(#crown-glow)" opacity="0.7"/>

    <!-- Main Crown -->
    <path d="
      M160,55
      L162,30
      L170,42
      L178,15
      L186,42
      L200,8
      L214,42
      L222,15
      L230,42
      L238,30
      L240,55
      Q230,50 220,52
      Q210,54 200,52
      Q190,54 180,52
      Q170,50 160,55
      Z"
      fill="url(#crown-gold)" stroke="#B45309" stroke-width="1.2"/>

    <!-- Crown bottom band -->
    <path d="M160,55 Q180,48 200,50 Q220,48 240,55 Q220,59 200,58 Q180,59 160,55 Z"
          fill="url(#crown-band)" stroke="#78350F" stroke-width="0.8"/>

    <!-- Crown inner filigree -->
    <path d="M170,48 Q175,40 180,48" fill="none" stroke="#FFF" stroke-width="1" opacity="0.6"/>
    <path d="M190,46 Q195,38 200,46" fill="none" stroke="#FFF" stroke-width="1" opacity="0.6"/>
    <path d="M210,46 Q215,38 220,46" fill="none" stroke="#FFF" stroke-width="1" opacity="0.6"/>

    <!-- Big Center Emerald Jewel -->
    <circle cx="200" cy="12" r="5" fill="url(#jewel-emerald)" stroke="#047857" stroke-width="1" filter="url(#emerald-glow)"/>
    <circle cx="200" cy="10.5" r="1.8" fill="#A7F3D0"/>

    <!-- Left Emerald Jewels -->
    <circle cx="178" cy="19" r="3.5" fill="url(#jewel-emerald)" stroke="#047857" stroke-width="0.8"/>
    <circle cx="178" cy="18" r="1.2" fill="#A7F3D0"/>
    <circle cx="162" cy="33" r="2.8" fill="url(#jewel-emerald)" stroke="#047857" stroke-width="0.7"/>

    <!-- Right Emerald Jewels -->
    <circle cx="222" cy="19" r="3.5" fill="url(#jewel-emerald)" stroke="#047857" stroke-width="0.8"/>
    <circle cx="222" cy="18" r="1.2" fill="#A7F3D0"/>
    <circle cx="238" cy="33" r="2.8" fill="url(#jewel-emerald)" stroke="#047857" stroke-width="0.7"/>

    <!-- "RS" Monogram in Gold under Crown -->
    <text x="200" y="82" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif" font-weight="900"
          font-size="26px" letter-spacing="1"
          fill="url(#crown-gold)" stroke="#78350F" stroke-width="1"
          filter="url(#crown-glow)">
      RS
    </text>
  </g>
</svg>
