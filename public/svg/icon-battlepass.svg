<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="shieldGradInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="60%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="bladeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CBD5E1"/>
      <stop offset="50%" stop-color="#94A3B8"/>
      <stop offset="100%" stop-color="#64748B"/>
    </linearGradient>
    <linearGradient id="handleGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <filter id="shieldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" in="SourceGraphic" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.063  0 0 0 0 0.725  0 0 0 0 0.506  0 0 0 0.4 0" result="greenGlow"/>
      <feMerge>
        <feMergeNode in="greenGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="swordShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="0.8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <clipPath id="shieldClip">
      <path d="M 22 8 C 16 8, 10 10, 10 16 L 10 26 C 10 32, 16 38, 22 42 L 24 43 L 26 42 C 32 38, 38 32, 38 26 L 38 16 C 38 10, 32 8, 26 8 Z"/>
    </clipPath>
  </defs>

  <g id="battlepass">
    <!-- Sword behind shield -->
    <g filter="url(#swordShadow)" transform="translate(2, 0)">
      <!-- Sword blade -->
      <path d="
        M 34 6
        L 36 7
        L 30 36
        L 28 36
        Z
      " fill="url(#bladeGrad)"/>

      <!-- Blade edge highlight -->
      <path d="
        M 34 6
        L 35 6.5
        L 29 36
        L 28.5 36
        Z
      " fill="#CBD5E1" opacity="0.5"/>

      <!-- Blade tip point -->
      <path d="M 28 36 L 29 40 L 30 36 Z" fill="#94A3B8"/>

      <!-- Sword guard (crossguard) -->
      <rect x="26" y="5" width="10" height="3" rx="1" fill="url(#handleGold)"/>
      <rect x="27" y="5.5" width="8" height="1" rx="0.5" fill="#FBBF24" opacity="0.4"/>

      <!-- Sword handle/grip -->
      <rect x="30" y="2" width="3" height="4" rx="0.8" fill="#92400E"/>
      <line x1="31" y1="2.5" x2="31" y2="5.5" stroke="#B45309" stroke-width="0.5"/>
      <line x1="32" y1="2.5" x2="32" y2="5.5" stroke="#B45309" stroke-width="0.5"/>

      <!-- Pommel -->
      <circle cx="31.5" cy="1.5" r="1.5" fill="url(#handleGold)"/>
      <circle cx="31.5" cy="1.5" r="0.6" fill="#10B981"/>
    </g>

    <!-- Shield -->
    <g filter="url(#shieldGlow)">
      <!-- Shield shape -->
      <path d="
        M 22 8
        C 16 8, 10 10, 10 16
        L 10 26
        C 10 32, 16 38, 22 42
        L 24 43
        L 26 42
        C 32 38, 38 32, 38 26
        L 38 16
        C 38 10, 32 8, 26 8
        Z
      " fill="url(#shieldGrad)" stroke="#047857" stroke-width="2"/>

      <!-- Inner shield border -->
      <path d="
        M 22 11
        C 17.5 11, 13 12.5, 13 17
        L 13 25.5
        C 13 30.5, 17.5 35.5, 22.5 39
        L 24 40
        L 25.5 39
        C 30.5 35.5, 35 30.5, 35 25.5
        L 35 17
        C 35 12.5, 30.5 11, 26 11
        Z
      " fill="url(#shieldGradInner)" opacity="0.3"/>

      <!-- Chevron pattern (upper) -->
      <g clip-path="url(#shieldClip)">
        <path d="M 10 22 L 24 16 L 38 22" fill="none" stroke="#047857" stroke-width="1.2" opacity="0.5"/>
        <path d="M 10 26 L 24 20 L 38 26" fill="none" stroke="#047857" stroke-width="1" opacity="0.35"/>

        <!-- Horizontal band -->
        <rect x="10" y="24" width="28" height="3" fill="#047857" opacity="0.2"/>

        <!-- Lower chevron -->
        <path d="M 12 30 L 24 26 L 36 30" fill="none" stroke="#047857" stroke-width="0.8" opacity="0.25"/>
      </g>

      <!-- Shield center highlight -->
      <ellipse cx="22" cy="18" rx="6" ry="4" fill="white" opacity="0.08" transform="rotate(-15, 22, 18)"/>
    </g>
  </g>
</svg>
