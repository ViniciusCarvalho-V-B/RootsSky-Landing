<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="crownGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="crownGoldShine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="jewelGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sparkleGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="0.8" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="crown" filter="url(#dropShadow)">
    <!-- Crown body -->
    <path d="
      M 8 34
      L 5 16
      L 14 24
      L 24 8
      L 34 24
      L 43 16
      L 40 34
      Z
    " fill="url(#crownGold)"/>

    <!-- Inner crown shading for depth -->
    <path d="
      M 10 32
      L 8 20
      L 15 26
      L 24 13
      L 33 26
      L 40 20
      L 38 32
      Z
    " fill="url(#crownGoldShine)" opacity="0.4"/>

    <!-- Crown base band -->
    <rect x="7" y="33" width="34" height="5" rx="1" fill="#B45309"/>
    <rect x="7" y="33" width="34" height="2" rx="0.5" fill="#D97706" opacity="0.6"/>

    <!-- Base band decorative line -->
    <line x1="9" y1="35.5" x2="39" y2="35.5" stroke="#92400E" stroke-width="0.5" opacity="0.5"/>

    <!-- Jewels at the 3 crown points -->
    <g filter="url(#jewelGlow)">
      <!-- Left jewel -->
      <circle cx="5" cy="16" r="2.5" fill="#10B981"/>
      <circle cx="4.3" cy="15.2" r="0.8" fill="#34D399" opacity="0.6"/>

      <!-- Center jewel (top) -->
      <circle cx="24" cy="8" r="2.5" fill="#10B981"/>
      <circle cx="23.2" cy="7.2" r="0.8" fill="#34D399" opacity="0.6"/>

      <!-- Right jewel -->
      <circle cx="43" cy="16" r="2.5" fill="#10B981"/>
      <circle cx="42.3" cy="15.2" r="0.8" fill="#34D399" opacity="0.6"/>
    </g>

    <!-- Sparkle near top point -->
    <g filter="url(#sparkleGlow)" transform="translate(29, 6)">
      <!-- Vertical line -->
      <line x1="0" y1="-3" x2="0" y2="3" stroke="#FEFCE8" stroke-width="1" stroke-linecap="round"/>
      <!-- Horizontal line -->
      <line x1="-3" y1="0" x2="3" y2="0" stroke="#FEFCE8" stroke-width="1" stroke-linecap="round"/>
      <!-- Diagonal lines (smaller) -->
      <line x1="-1.8" y1="-1.8" x2="1.8" y2="1.8" stroke="#FEFCE8" stroke-width="0.6" stroke-linecap="round"/>
      <line x1="1.8" y1="-1.8" x2="-1.8" y2="1.8" stroke="#FEFCE8" stroke-width="0.6" stroke-linecap="round"/>
    </g>

    <!-- Second smaller sparkle -->
    <g filter="url(#sparkleGlow)" transform="translate(16, 11)" opacity="0.5">
      <line x1="0" y1="-1.5" x2="0" y2="1.5" stroke="#FEF9C3" stroke-width="0.7" stroke-linecap="round"/>
      <line x1="-1.5" y1="0" x2="1.5" y2="0" stroke="#FEF9C3" stroke-width="0.7" stroke-linecap="round"/>
    </g>

    <!-- Crown ridge highlights -->
    <path d="M 9 33 L 7 18 L 14.5 25" fill="none" stroke="#FBBF24" stroke-width="0.5" opacity="0.3"/>
    <path d="M 39 33 L 41 18 L 33.5 25" fill="none" stroke="#FBBF24" stroke-width="0.5" opacity="0.3"/>
  </g>
</svg>
